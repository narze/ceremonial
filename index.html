<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ceremonial Tea Name Generator · เครื่องสุ่มชื่อชาเขียวเกรดพิธีการ</title>
<meta name="description" content="สุ่มชื่อชาเขียวเกรดพิธีการแบบเท่ๆ เบียวๆ พร้อมชื่อไทยและเกรดพิธีการ">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0d08;
    --bg2:#15160f;
    --card:#191b12;
    --gold:#e0bd6f;
    --gold-dim:#ab8e50;
    --jade:#7fd3a0;
    --jade-deep:#356f53;
    --text:#f1efe6;
    --text-dim:#a8a596;
    --text-faint:#6b6757;
    --danger:#e07a5a;
    --border:rgba(224,189,111,0.18);
    --title-gold:#eccf85;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:"Noto Sans Thai",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:
      radial-gradient(90% 60% at 50% -8%, rgba(196,142,72,0.13) 0%, transparent 60%),
      radial-gradient(120% 80% at 50% 0%, var(--bg2) 0%, var(--bg) 60%);
    background-attachment:fixed;
    color:var(--text);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px 18px;
    overflow-x:hidden;
  }
  .wrap{width:100%;max-width:440px;}
  .eyebrow{
    text-align:center;
    font-size:12px;
    letter-spacing:4px;
    text-transform:uppercase;
    color:var(--gold-dim);
    margin-bottom:18px;
  }
  .eyebrow i{color:var(--gold);}
  .stage{
    background:linear-gradient(160deg, var(--card) 0%, #11130c 100%);
    border:1px solid var(--border);
    border-radius:24px;
    padding:40px 24px 34px;
    text-align:center;
    position:relative;
    overflow:hidden;
    box-shadow:0 18px 50px rgba(0,0,0,0.45), 0 0 90px rgba(196,142,72,0.12), inset 0 1px 0 rgba(224,189,111,0.10);
  }
  .stage::before{
    content:"";
    position:absolute;
    top:-50%;left:-50%;
    width:200%;height:200%;
    background:conic-gradient(from 0deg, transparent 0deg, rgba(224,189,111,0.08) 40deg, transparent 80deg, transparent 360deg);
    animation:spin 14s linear infinite;
    pointer-events:none;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .label-grade{
    font-size:11px;
    letter-spacing:3px;
    text-transform:uppercase;
    color:var(--text-dim);
    margin-bottom:20px;
    position:relative;
  }
  .name-en{
    font-size:27px;
    font-weight:700;
    line-height:1.3;
    letter-spacing:0.5px;
    color:var(--title-gold);
    text-shadow:0 0 22px rgba(224,189,111,0.28);
    text-wrap:balance;
    min-height:72px;
    display:flex;align-items:center;justify-content:center;
    padding:0 4px;
    position:relative;
    overflow-wrap:anywhere;
  }
  .name-th{
    font-size:19px;
    font-weight:600;
    color:var(--jade);
    margin-top:12px;
    line-height:1.45;
    padding:0 4px;
    position:relative;
    overflow-wrap:anywhere;
    word-break:break-word;
    text-wrap:balance;
  }
  .rank{
    display:inline-block;
    margin-top:18px;
    font-size:12.5px;
    color:var(--gold);
    border:1px solid var(--border);
    border-radius:999px;
    padding:5px 16px;
    letter-spacing:0.5px;
    position:relative;
    background:rgba(224,189,111,0.05);
  }
  /* reveal animations */
  .reveal{animation:rise .55s cubic-bezier(.2,.7,.2,1) both;}
  @keyframes rise{
    from{opacity:0;transform:translateY(14px) scale(.97);filter:blur(6px);}
    to{opacity:1;transform:none;filter:blur(0);}
  }
  .flash{animation:flash .7s ease both;}
  @keyframes flash{
    0%{opacity:0;letter-spacing:8px;}
    40%{opacity:1;}
    100%{opacity:1;letter-spacing:0.5px;}
  }
  .pulse{animation:pulse .5s ease both;}
  @keyframes pulse{
    0%{opacity:0;transform:scale(.8);}
    60%{transform:scale(1.06);}
    100%{opacity:1;transform:scale(1);}
  }
  .btn-main{
    width:100%;
    margin-top:22px;
    padding:17px;
    font-size:17px;
    font-weight:700;
    font-family:inherit;
    color:#1a130a;
    background:linear-gradient(100deg, var(--gold) 0%, #f1da9e 50%, var(--gold) 100%);
    border:none;
    border-radius:14px;
    cursor:pointer;
    letter-spacing:1px;
    transition:transform .12s ease, box-shadow .2s ease;
    box-shadow:0 6px 24px rgba(224,189,111,0.25);
  }
  .btn-main:hover{transform:translateY(-1px);box-shadow:0 8px 30px rgba(224,189,111,0.4);}
  .btn-main:active{transform:scale(.98);}
  .btn-main:focus-visible{outline:2px solid var(--text);outline-offset:3px;}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:11px;}
  .btn-img{
    width:100%;
    padding:14px;
    font-size:15px;
  }
  .btn{
    padding:12px;
    min-height:44px;
    font-size:14px;
    font-family:inherit;
    font-weight:600;
    color:var(--text-dim);
    background:transparent;
    border:1px solid var(--border);
    border-radius:12px;
    cursor:pointer;
    transition:all .15s ease;
  }
  .btn:hover{color:var(--text);border-color:rgba(224,189,111,0.4);background:rgba(224,189,111,0.05);}
  .btn:active{transform:scale(.98);}
  .btn:focus-visible{outline:2px solid var(--gold);outline-offset:2px;}
  .btn.on{color:#1a130a;background:var(--danger);border-color:var(--danger);}
  .log{margin-top:24px;display:flex;flex-direction:column;gap:7px;}
  .log-item{
    font-size:13px;
    color:var(--text-dim);
    padding:9px 13px;
    background:rgba(255,255,255,0.02);
    border:1px solid rgba(255,255,255,0.05);
    border-radius:10px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    animation:rise .35s ease both;
  }
  .foot{
    text-align:center;
    margin-top:26px;
    font-size:11px;
    color:var(--text-dim);
    letter-spacing:1px;
  }
  .foot i{color:var(--gold-dim);}
  @media (prefers-reduced-motion: reduce){
    .stage::before{animation:none;}
    .reveal,.flash,.pulse{animation:none;}
    .log-item{animation:none;}
    .btn-main,.btn{transition:none;}
    .btn-main:hover{transform:none;}
  }
</style>
</head>
<body>
<div class="wrap">
  <h1 class="eyebrow"><i aria-hidden="true">✦</i> ceremonial grade tea <i aria-hidden="true">✦</i></h1>

  <div class="stage">
    <div class="label-grade">— สุ่มชื่อชาเขียวเกรดพิธีการ —</div>
    <div class="proclaim" aria-live="polite" aria-atomic="true">
      <div class="name-en" id="nameEn" lang="en">Super Ceremonial Matcha</div>
      <div class="name-th" id="nameTh">「มัทฉะแห่งสุพรรณ」</div>
      <div><span class="rank" id="rank">เกรดพิธีการขั้นพื้นฐาน</span></div>
    </div>
  </div>

  <button class="btn-main" id="gen" aria-label="อัญเชิญชื่อชาเกรดพิธีการใหม่">✦ อัญเชิญชื่อใหม่ ✦</button>
  <div class="row">
    <button class="btn btn-img" id="copyImg" aria-label="คัดลอกภาพชื่อชา">🖼 คัดลอกภาพ</button>
    <button class="btn btn-img" id="speak" aria-label="อ่านชื่อชาออกเสียง" aria-pressed="false">🔊 อ่าน</button>
  </div>
  <div class="row">
    <button class="btn" id="copy" aria-label="คัดลอกชื่อชาเป็นข้อความ">⧉ คัดลอก</button>
    <button class="btn" id="chaos" aria-label="สลับโหมดเบียวสุด" aria-pressed="false">🔥 โหมดเบียวสุด</button>
  </div>

  <div class="log" id="log"></div>

  <div class="foot"><i aria-hidden="true">※</i> brewed with ceremonial intent</div>
</div>

<script>
(function(){
  var prefixEn = ["Super","Ultra","Hyper","Mega","Grand","Divine","Eternal","Imperial","Sacred","Supreme","Forbidden","Ancient","Cosmic","Infinite","Phantom","Crimson","Golden","Mythic","Legendary","Celestial","Abyssal","Astral","Twilight","Royal","Primordial","Transcendent","Omega","Apex","Ethereal","Boundless","Almighty","Arcane","Sovereign","Immortal","Radiant","Obsidian","Spectral","Heavenly","Unrivaled","Fabled","Exalted","Void-Touched","Thousand-Year","Dragon-Blessed","Moonlit"];
  var coreEn = ["Matcha","Sencha","Gyokuro","Jade Essence","Emerald Dew","Tea of the Void","Verdant Soul","Green Spirit","Dragonwell","Zen Nectar","Hojicha","Kabusecha","Chlorophyll Edge","Bamboo Whisper","Mist of Uji","Leaf of Heaven","Eternal Steep","Emerald Tempest","Jade Serpent","Whisked Oblivion","Genmaicha","Tencha","Umami Requiem","Jade Phoenix","Verdant Eclipse","Whisper of the First Flush","Stone-Milled Destiny","Emerald Enlightenment","Chashitsu Phantom","Froth of the Gods","Tea Master's Last Breath","Shadow Steep"];
  var midOptions = ["Ceremonial","Imperial Ceremonial","Ritual Ceremonial","Sacred Rite Ceremonial","Premium Grade Ceremonial"];

  var prefixTh = ["สุดยอด","มหา","อภิมหา","ศักดิ์สิทธิ์","ต้องห้าม","อมตะ","พิฆาต","ลี้ลับ","ราชันย์","นิรันดร์","เหนือมนุษย์","อสูร","สุริยะ","จันทรา","วายุ","อัคคี","เทพ","มหาเทพ","ปฐมกาล","จ้าวสมุทร","ทมิฬ","วิปลาส","สะท้านฟ้า","เหนือกาล"];
  var coreTh = ["มัทฉะ","ชาเขียว","เกียวคุโระ","เซนฉะ","น้ำค้างหยก","วิญญาณใบชา","ลมหายใจไผ่","ชาแห่งความว่างเปล่า","หยดมรกต","จิตวิญญาณเซน","โฮจิฉะ","เก็นไมฉะ","มรกตสีรุ้ง","อสนีบาตใบชา","ฟองชาแห่งเทพ","เลือดมังกรเขียว","น้ำตาเซียน","ใบชาพันปี","เพลิงมรกต","หมอกแห่งอุจิ"];
  var placeTh = ["แห่งสุพรรณ","แห่งอุจิ","แห่งดอยสูง","แห่งวัดร้าง","แห่งภูเขาต้องห้าม","แห่งสายหมอก","แห่งกาลเวลา","แห่งเงาจันทร์","ที่หายสาบสูญ","แห่งเซียนชา","ที่ปลุกมังกรในใจ"];
  var chaosTh = ["ที่ดื่มแล้วบรรลุธรรม","ที่ทำลายถ้วยชาแห่งโชคชะตา","ที่มนุษย์ไม่ควรลิ้มลอง","ที่ปลุกพลังนิทราพันปี","ที่ฉีกฟ้าทะลุนรก","แห่งการเก็บเกี่ยวครั้งสุดท้าย","ที่อูมามิไร้ขอบเขต"];
  var ranks = ["เกรดพิธีการขั้นพื้นฐาน","เกรดพิธีการต้องห้าม","เกรดพิธีการระดับเทพ","เกรดพิธีการแห่งจักรวาล","เกรดพิธีการที่หายสาบสูญ","เกรดพิธีการขั้นสูงสุด","เกรดพิธีการแห่งตำนาน","เกรดพิธีการที่มนุษย์ไม่ควรดื่ม","เกรดพิธีการที่จักรพรรดิหวงห้าม","เกรดพิธีการสงวนไว้สำหรับเทพเจ้า","เกรดพิธีการเหนือกาลเวลา","เกรดพิธีการที่ผนึกด้วยเวทมนตร์","เกรดพิธีการแห่งสำนักลับ","เกรดพิธีการที่ดื่มได้ครั้งเดียวในชีวิต","เกรดพิธีการขั้นบรรลุนิพพาน","เกรดพิธีการที่สั่นสะเทือนสามโลก","เกรดพิธีการต้นตำรับพันปี","เกรดพิธีการที่หยุดยั้งวันสิ้นโลก","เกรดพิธีการแห่งราชวงศ์ที่ล่มสลาย","เกรดพิธีการที่มังกรเฝ้าหวง"];

  var nameEnEl = document.getElementById("nameEn");
  var nameThEl = document.getElementById("nameTh");
  var rankEl = document.getElementById("rank");
  var logEl = document.getElementById("log");
  var chaosMode = false;
  var pick = function(a){ return a[Math.floor(Math.random()*a.length)]; };

  // Single source of truth for the share-card palette: read the :root tokens
  // so a color change in CSS reaches the canvas too.
  var rootStyle = getComputedStyle(document.documentElement);
  function tok(n){ return rootStyle.getPropertyValue(n).trim(); }
  var C = {
    bg: tok("--bg"), bg2: tok("--bg2"), gold: tok("--gold"),
    goldDim: tok("--gold-dim"), jade: tok("--jade"), muted: tok("--text-dim")
  };
  var GOLD_TITLE = tok("--title-gold"); // solid gold for the canvas title, matched to the live .name-en

  function reflow(el){ void el.offsetWidth; }

  function gen(){
    if("speechSynthesis" in window && window.speechSynthesis.speaking){
      window.speechSynthesis.cancel();
      resetSpeakBtn();
    }
    var en = pick(prefixEn) + " " + pick(midOptions) + " " + pick(coreEn);
    var th = pick(prefixTh) + pick(coreTh) + pick(placeTh);
    if(chaosMode){ th += pick(chaosTh); }
    var rk = pick(ranks);

    nameEnEl.textContent = en;
    nameThEl.textContent = "「" + th + "」";
    rankEl.textContent = rk;

    nameEnEl.classList.remove("flash"); reflow(nameEnEl); nameEnEl.classList.add("flash");
    nameThEl.classList.remove("reveal"); reflow(nameThEl); nameThEl.classList.add("reveal"); nameThEl.style.animationDelay=".12s";
    rankEl.classList.remove("pulse"); reflow(rankEl); rankEl.classList.add("pulse"); rankEl.style.animationDelay=".28s";

    var item = document.createElement("div");
    item.className = "log-item";
    item.textContent = en + " 「" + th + "」";
    logEl.insertBefore(item, logEl.firstChild);
    while(logEl.children.length > 5){ logEl.removeChild(logEl.lastChild); }
  }

  document.getElementById("gen").addEventListener("click", gen);
  document.getElementById("copy").addEventListener("click", function(){
    var btn = this;
    var txt = nameEnEl.textContent + "\n" + nameThEl.textContent + "\n" + rankEl.textContent;
    navigator.clipboard.writeText(txt).then(function(){
      btn.textContent = "✓ คัดลอกแล้ว";
      setTimeout(function(){ btn.textContent = "⧉ คัดลอก"; }, 1200);
    });
  });
  // ---- อ่านออกเสียง (TTS) : อังกฤษก่อน แล้วต่อด้วยไทย+เกรด ----
  var speakBtn = document.getElementById("speak");
  function resetSpeakBtn(){
    speakBtn.textContent = "🔊 อ่าน";
    speakBtn.classList.remove("on");
    speakBtn.setAttribute("aria-pressed", "false");
  }
  speakBtn.addEventListener("click", function(){
    if(!("speechSynthesis" in window)){
      speakBtn.textContent = "✗ ไม่รองรับ";
      setTimeout(resetSpeakBtn, 1400);
      return;
    }
    var synth = window.speechSynthesis;
    if(synth.speaking || synth.pending){
      synth.cancel();
      resetSpeakBtn();
      return;
    }
    function stopAll(){ synth.cancel(); resetSpeakBtn(); }

    var en = new SpeechSynthesisUtterance(nameEnEl.textContent);
    en.lang = "en-US";
    en.rate = 0.95;
    en.onerror = stopAll;

    var th = new SpeechSynthesisUtterance(nameThEl.textContent.replace(/[「」]/g,"") + " " + rankEl.textContent);
    th.lang = "th-TH";
    th.rate = 0.95;
    th.onend = resetSpeakBtn;
    th.onerror = stopAll;

    speakBtn.textContent = "⏹ หยุดอ่าน";
    speakBtn.classList.add("on");
    speakBtn.setAttribute("aria-pressed", "true");
    synth.speak(en);
    synth.speak(th);
  });

  document.getElementById("chaos").addEventListener("click", function(){
    chaosMode = !chaosMode;
    this.classList.toggle("on", chaosMode);
    this.setAttribute("aria-pressed", chaosMode ? "true" : "false");
    this.textContent = chaosMode ? "🔥 เบียวสุด: เปิด" : "🔥 โหมดเบียวสุด";
    gen();
  });

  // ---- คัดลอกภาพ : render ลง canvas ขนาดคงที่ 800x600 ----
  function wrapText(ctx, text, maxWidth){
    var words = text.split(" ");
    var lines = [], line = "";
    for(var i=0;i<words.length;i++){
      var test = line ? line + " " + words[i] : words[i];
      if(ctx.measureText(test).width > maxWidth && line){
        lines.push(line); line = words[i];
      } else { line = test; }
    }
    if(line) lines.push(line);
    // Break any line still too wide (e.g. Thai text with no spaces)
    var result = [];
    for(var j=0;j<lines.length;j++){
      if(ctx.measureText(lines[j]).width <= maxWidth){ result.push(lines[j]); continue; }
      var charLine = "";
      for(var ci=0;ci<lines[j].length;ci++){
        var tc = charLine + lines[j][ci];
        if(ctx.measureText(tc).width > maxWidth && charLine){ result.push(charLine); charLine = lines[j][ci]; }
        else { charLine = tc; }
      }
      if(charLine) result.push(charLine);
    }
    return result;
  }

  function renderCanvas(){
    var W = 800, H = 600;
    var c = document.createElement("canvas");
    c.width = W; c.height = H;
    var ctx = c.getContext("2d");

    // พื้นหลังไล่เฉด
    var bg = ctx.createRadialGradient(W/2, 0, 80, W/2, 0, H*1.1);
    bg.addColorStop(0, C.bg2);
    bg.addColorStop(1, C.bg);
    ctx.fillStyle = bg;
    ctx.fillRect(0,0,W,H);

    // กรอบทอง
    ctx.strokeStyle = "rgba(224,189,111,0.35)";
    ctx.lineWidth = 2;
    ctx.strokeRect(28,28,W-56,H-56);
    ctx.strokeStyle = "rgba(224,189,111,0.15)";
    ctx.strokeRect(40,40,W-80,H-80);

    ctx.textAlign = "center";

    // eyebrow
    ctx.fillStyle = C.goldDim;
    ctx.font = "600 18px 'Noto Sans Thai', sans-serif";
    ctx.fillText("✦  CEREMONIAL GRADE TEA  ✦", W/2, 110);

    // label
    ctx.fillStyle = C.muted;
    ctx.font = "400 18px 'Noto Sans Thai', sans-serif";
    ctx.fillText("— ชาเขียวเกรดพิธีการ —", W/2, 160);

    // ชื่ออังกฤษ (ทอง, wrap ได้)
    ctx.fillStyle = GOLD_TITLE;
    ctx.font = "700 46px 'Noto Sans Thai', sans-serif";
    var enLines = wrapText(ctx, nameEnEl.textContent, W-140);
    var enY = 250;
    enLines.forEach(function(l){ ctx.fillText(l, W/2, enY); enY += 56; });

    // ชื่อไทย (เขียวหยก, wrap ได้)
    ctx.fillStyle = C.jade;
    ctx.font = "600 34px 'Noto Sans Thai', sans-serif";
    var thLines = wrapText(ctx, nameThEl.textContent, W-160);
    var thY = enY + 30;
    thLines.forEach(function(l){ ctx.fillText(l, W/2, thY); thY += 44; });

    // เกรด (pill ทอง)
    ctx.font = "500 22px 'Noto Sans Thai', sans-serif";
    var rk = rankEl.textContent;
    var rkW = ctx.measureText(rk).width + 50;
    var rkX = W/2 - rkW/2, rkY = Math.min(thY + 30, H-90), rkH = 46;
    ctx.fillStyle = "rgba(224,189,111,0.08)";
    ctx.strokeStyle = "rgba(224,189,111,0.35)";
    ctx.lineWidth = 1.5;
    if(ctx.roundRect){ ctx.beginPath(); ctx.roundRect(rkX, rkY, rkW, rkH, 23); ctx.fill(); ctx.stroke(); }
    else { ctx.fillRect(rkX, rkY, rkW, rkH); ctx.strokeRect(rkX, rkY, rkW, rkH); }
    ctx.fillStyle = C.gold;
    ctx.fillText(rk, W/2, rkY + 31);

    // footer
    ctx.fillStyle = C.muted;
    ctx.font = "400 15px 'Noto Sans Thai', sans-serif";
    ctx.fillText("ceremonial.vercel.app", W/2, H-50);

    return c;
  }

  document.getElementById("copyImg").addEventListener("click", function(){
    var btn = this;
    var orig = btn.getAttribute("data-orig") || btn.textContent;
    btn.setAttribute("data-orig", orig);
    function render(){
      var canvas = renderCanvas();
      canvas.toBlob(function(blob){
        if(!blob){ btn.textContent = "✗ ไม่สำเร็จ"; setTimeout(function(){btn.textContent=orig;},1400); return; }
        if(navigator.clipboard && window.ClipboardItem){
          navigator.clipboard.write([new ClipboardItem({"image/png": blob})]).then(function(){
            btn.textContent = "✓ คัดลอกภาพแล้ว";
            setTimeout(function(){ btn.textContent = orig; }, 1400);
          }).catch(function(){
            downloadBlob(blob); btn.textContent = "✓ บันทึกภาพแล้ว";
            setTimeout(function(){ btn.textContent = orig; }, 1400);
          });
        } else {
          downloadBlob(blob); btn.textContent = "✓ บันทึกภาพแล้ว";
          setTimeout(function(){ btn.textContent = orig; }, 1400);
        }
      }, "image/png");
    }
    // Render in Noto Sans Thai: wait for the webfont so the card isn't a fallback.
    if(document.fonts && document.fonts.ready){
      document.fonts.ready.then(render, render);
    } else {
      render();
    }
  });

  function downloadBlob(blob){
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = "ceremonial-tea.png";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  gen();
})();
</script>
</body>
</html>
